<svg viewBox="0 0 720 612" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Dental Vision Benchmark pipeline</title>
  <desc>Open-licensed and private dental images are shown to several vision models with the caption removed and no internet access; each model writes a description; two independent judges that can see the image plus the real caption and the clinician rubric grade every description; the output is a leaderboard, a public-versus-control memorization gap, and a fail gallery.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="360" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Dental Vision Benchmark</text>
  <text x="360" y="51" text-anchor="middle" font-size="12.5" fill="#6b7280">Which model actually reads a dental image?</text>

  <rect x="150" y="72" width="420" height="62" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="168" y="94" font-size="13" font-weight="700" fill="#111827">1 · IMAGES</text>
  <text x="168" y="112" font-size="11" fill="#6b7280">Open-licensed (Wikimedia, open access)</text>
  <text x="168" y="127" font-size="11" fill="#6b7280">+ private control set (yours / transformed)</text>
  <rect x="452" y="84" width="106" height="19" rx="9.5" fill="none" stroke="#2E9E96"/>
  <text x="505" y="96.5" text-anchor="middle" font-size="9.5" fill="#2E9E96">captions removed</text>

  <line x1="360" y1="134" x2="250" y2="157" stroke="#cbd0d6" marker-end="url(#arr)"/>
  <line x1="360" y1="134" x2="570" y2="157" stroke="#cbd0d6" marker-end="url(#arr)"/>

  <rect x="40" y="158" width="406" height="124" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="58" y="180" font-size="13" font-weight="700" fill="#111827">2 · VISION CONTESTANTS</text>
  <rect x="58" y="189" width="248" height="19" rx="9.5" fill="none" stroke="#2E9E96"/>
  <text x="182" y="201.5" text-anchor="middle" font-size="9.5" fill="#2E9E96">image only · no caption · no internet</text>
  <g font-size="10" fill="#111827">
    <rect x="56" y="220" width="70" height="22" rx="6" fill="none" stroke="#e5e7eb"/><text x="91" y="234.5" text-anchor="middle">GPT-5.5</text>
    <rect x="132" y="220" width="70" height="22" rx="6" fill="none" stroke="#e5e7eb"/><text x="167" y="234.5" text-anchor="middle">Claude</text>
    <rect x="208" y="220" width="70" height="22" rx="6" fill="none" stroke="#e5e7eb"/><text x="243" y="234.5" text-anchor="middle">Gemini</text>
    <rect x="284" y="220" width="70" height="22" rx="6" fill="none" stroke="#e5e7eb"/><text x="319" y="234.5" text-anchor="middle">Qwen-VL</text>
    <rect x="360" y="220" width="70" height="22" rx="6" fill="none" stroke="#e5e7eb"/><text x="395" y="234.5" text-anchor="middle">Llama / GLM</text>
  </g>
  <text x="58" y="268" font-size="11" font-style="italic" fill="#6b7280">each writes a free-text description</text>

  <rect x="466" y="158" width="214" height="124" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="482" y="180" font-size="12" font-weight="700" fill="#111827">GROUND TRUTH</text>
  <text x="482" y="201" font-size="10.5" fill="#6b7280">Clinician writes, per image:</text>
  <text x="482" y="219" font-size="10" fill="#111827" font-family="ui-monospace, monospace">must_identify</text>
  <text x="482" y="234" font-size="10" fill="#111827" font-family="ui-monospace, monospace">must_avoid</text>
  <text x="482" y="252" font-size="10.5" fill="#6b7280">+ reference caption</text>
  <text x="482" y="271" font-size="10.5" font-weight="600" fill="#2E9E96">You sign off.</text>

  <line x1="243" y1="282" x2="320" y2="313" stroke="#cbd0d6" marker-end="url(#arr)"/>
  <line x1="573" y1="282" x2="400" y2="313" stroke="#cbd0d6" marker-end="url(#arr)"/>

  <rect x="150" y="314" width="420" height="76" rx="10" fill="#ffffff" stroke="#2E9E96" stroke-width="1.5"/>
  <text x="168" y="336" font-size="13" font-weight="700" fill="#111827">3 · TWO JUDGES</text>
  <rect x="248" y="324" width="190" height="19" rx="9.5" fill="none" stroke="#2E9E96"/>
  <text x="343" y="336.5" text-anchor="middle" font-size="9.5" fill="#2E9E96">each sees image + the real answer key</text>
  <text x="168" y="360" font-size="11" fill="#6b7280">independent vendors grade against the truth:</text>
  <text x="168" y="378" font-size="10.5" fill="#111827" font-family="ui-monospace, monospace">covered · violations · modality · agreement</text>

  <line x1="360" y1="390" x2="360" y2="412" stroke="#cbd0d6" marker-end="url(#arr)"/>

  <rect x="60" y="414" width="600" height="98" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="78" y="436" font-size="13" font-weight="700" fill="#111827">4 · RESULTS</text>
  <text x="78" y="458" font-size="11.5" fill="#111827">▸ Leaderboard — the best dental-image reader</text>
  <text x="78" y="478" font-size="11.5" fill="#111827">▸ Public vs control images = the memorization gap</text>
  <text x="78" y="498" font-size="11.5" fill="#111827">▸ Fail gallery — the shareable proof</text>

  <rect x="60" y="556" width="13" height="13" rx="3" fill="none" stroke="#2E9E96"/>
  <text x="80" y="566.5" font-size="10.5" fill="#6b7280">teal = the two safeguards: no leakage going in, the real answer key at judging</text>
</svg>
